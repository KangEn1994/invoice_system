name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Python compile check
        run: python -m compileall -q backend/app

      - name: Import smoke check
        run: |
          PYTHONPATH=backend python - <<'PY'
          from app.main import app
          assert app is not None
          print("FastAPI app import OK")
          PY

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript parse check
        run: |
          node -e "const fs=require('fs'); new Function(fs.readFileSync('frontend/app.js','utf8')); console.log('frontend/app.js parse OK')"
          node -e "const fs=require('fs'); new Function(fs.readFileSync('frontend/share.js','utf8')); console.log('frontend/share.js parse OK')"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose config check
        run: |
          docker compose \
            -f stack/docker-compose.yml \
            -f stack/docker-compose.gpu.yml \
            -f stack/docker-compose.live-code.yml \
            config > /tmp/compose.resolved.yml
          test -s /tmp/compose.resolved.yml

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile --build-arg INSTALL_OCR=false -t invoice-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t invoice-frontend:ci .
